<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>真还传 · 首页方案 C</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
    }
    .screen {
      width: 100%; height: 100%;
      position: relative;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    /* 全屏背景 */
    .bg-image {
      position: absolute;
      inset: 0;
      background: url('../assets/backgrounds/classroom.png') center center / cover no-repeat;
      filter: brightness(0.3) saturate(0.7);
    }
    .bg-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(10,10,10,0.75) 0%, rgba(10,10,10,0.4) 45%, rgba(10,10,10,0.85) 100%);
    }
    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 45%, transparent 0%, rgba(0,0,0,0.7) 85%);
      pointer-events: none;
    }
    /* 顶部角色头像 */
    .top-avatar {
      position: relative;
      z-index: 5;
      margin-bottom: 4vh;
    }
    .avatar-frame {
      width: clamp(140px, 18vw, 200px);
      height: clamp(140px, 18vw, 200px);
      border-radius: 50%;
      border: 4px solid #f0c040;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(240,192,64,0.35), inset 0 0 30px rgba(0,0,0,0.6);
      background: #1a1510;
      position: relative;
    }
    .avatar-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }
    .avatar-glow {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 140%;
      height: 140%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(240,192,64,0.25) 0%, transparent 65%);
      z-index: -1;
      animation: glowPulse 3s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
    }
    /* 中间标题 */
    .content {
      text-align: center;
      z-index: 5;
      position: relative;
      margin-bottom: 3vh;
    }
    .main-title {
      font-size: clamp(56px, 9vw, 108px);
      font-weight: 900;
      color: #f0c040;
      letter-spacing: 18px;
      text-shadow: 0 0 40px rgba(240,192,64,0.5), 0 4px 0 #8a6a20;
      line-height: 1.1;
    }
    .subtitle {
      font-size: clamp(20px, 2.8vw, 34px);
      color: #e8d5a3;
      letter-spacing: 14px;
      margin-top: 1.5vh;
      font-weight: 500;
    }
    .quote {
      font-size: clamp(15px, 1.6vw, 20px);
      color: #b8a87a;
      font-style: italic;
      letter-spacing: 3px;
      margin-top: 3vh;
      padding: 0 8vw;
    }
    /* 底部按钮 - 垂直排列 */
    .bottom-bar {
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .divider {
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #f0c040, transparent);
      margin-bottom: 8px;
    }
    .btn {
      width: clamp(200px, 28vw, 280px);
      padding: clamp(14px, 1.8vw, 18px) 0;
      font-family: inherit;
      font-size: clamp(17px, 2vw, 22px);
      font-weight: 700;
      letter-spacing: 4px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid;
    }
    /* 主按钮：金色底，黑字 */
    .btn-primary {
      background: #f0c040;
      border-color: #f0c040;
      color: #0a0a0a;
    }
    .btn-primary:hover {
      background: #ffd860;
      border-color: #ffd860;
      box-shadow: 0 0 30px rgba(240,192,64,0.4);
      transform: translateY(-2px);
    }
    /* 次按钮：透明底，金色字 */
    .btn-secondary {
      background: rgba(240,192,64,0.08);
      border-color: rgba(240,192,64,0.5);
      color: #f0c040;
    }
    .btn-secondary:hover {
      background: rgba(240,192,64,0.18);
      border-color: #f0c040;
      box-shadow: 0 0 20px rgba(240,192,64,0.2);
      transform: translateY(-2px);
    }
    /* 装饰 */
    .corner-deco {
      position: absolute;
      width: 50px;
      height: 50px;
      border-color: rgba(240,192,64,0.25);
      z-index: 5;
    }
    .corner-deco.tl { top: 5vh; left: 5vw; border-top: 2px solid; border-left: 2px solid; }
    .corner-deco.tr { top: 5vh; right: 5vw; border-top: 2px solid; border-right: 2px solid; }
    .corner-deco.bl { bottom: 5vh; left: 5vw; border-bottom: 2px solid; border-left: 2px solid; }
    .corner-deco.br { bottom: 5vh; right: 5vw; border-bottom: 2px solid; border-right: 2px solid; }
    .particle {
      position: absolute;
      width: 3px; height: 3px;
      background: #f0c040;
      opacity: 0.4;
      z-index: 5;
    }
    .p1 { top: 25%; left: 18%; opacity: 0.5; }
    .p2 { top: 20%; right: 18%; opacity: 0.4; }
    .p3 { bottom: 30%; left: 15%; opacity: 0.3; }
    .p4 { bottom: 35%; right: 15%; opacity: 0.4; }
    .p5 { top: 45%; left: 8%; opacity: 0.25; }
    .p6 { top: 45%; right: 8%; opacity: 0.25; }
    @media (max-width: 768px) {
      .main-title { letter-spacing: 10px; }
      .subtitle { letter-spacing: 8px; }
      .top-avatar { margin-bottom: 3vh; }
      .content { margin-bottom: 2vh; }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>
    <div class="vignette"></div>
    <div class="corner-deco tl"></div>
    <div class="corner-deco tr"></div>
    <div class="corner-deco bl"></div>
    <div class="corner-deco br"></div>
    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>
    <div class="particle p4"></div>
    <div class="particle p5"></div>
    <div class="particle p6"></div>

    <div class="top-avatar">
      <div class="avatar-glow"></div>
      <div class="avatar-frame">
        <img src="./avatar-generated.png" alt="角色头像">
      </div>
    </div>

    <div class="content">
      <div class="main-title">真还传</div>
      <div class="subtitle">创业模拟器</div>
      <div class="quote">"彪悍的人生，不需要解释"</div>
    </div>

    <div class="bottom-bar">
      <div class="divider"></div>
      <button class="btn btn-primary">开始游戏</button>
      <button class="btn btn-secondary">继续游戏</button>
    </div>
  </div>
</body>
</html>
